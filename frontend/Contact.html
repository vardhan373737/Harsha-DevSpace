<style>
:root{
    --bg:#f7f2e8;
    --surface:#fffaf0;
    --ink:#1f1a14;
    --muted:#6e6253;
    --accent:#b88846;
    --accent-deep:#8f6632;
    --line:rgba(143,102,50,0.22);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Plus Jakarta Sans',sans-serif;
    color:var(--ink);
    min-height:100vh;
    background:radial-gradient(circle at 10% 12%,#fff8eb 0,#f5ecdd 38%,#f1e5d2 100%);
    overflow-x:hidden;
}

body::before,
body::after{
    content:"";
    position:fixed;
    z-index:-1;
    border-radius:50%;
}

body::before{
    width:430px;
    height:430px;
    top:-130px;
    right:-110px;
    background:radial-gradient(circle,#f0d3a6 0,#e9c186 46%,transparent 72%);
}

body::after{
    width:360px;
    height:360px;
    bottom:-150px;
    left:-120px;
    background:radial-gradient(circle,#d6ae75 0,#c49356 48%,transparent 72%);
}

.page-shell{
    width:min(1180px,92%);
    margin:22px auto;
    border:1px solid var(--line);
    border-radius:28px;
    background:linear-gradient(140deg,rgba(255,250,240,0.95),rgba(252,245,233,0.9));
    box-shadow:0 25px 60px rgba(91,67,35,0.18);
    backdrop-filter:blur(8px);
    overflow:hidden;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 48px;
    border-bottom:1px solid var(--line);
}

.logo{
    display:flex;
    align-items:center;
    gap:14px;
}

.logo img{
    width:56px;
    height:56px;
    border-radius:16px;
    object-fit:cover;
    border:1px solid var(--line);
}

.logo h2{
    font-size:1.08rem;
    letter-spacing:0.11em;
    text-transform:uppercase;
    font-weight:700;
}

nav{
    display:flex;
    flex-wrap:wrap;
    justify-content:flex-end;
    gap:22px;
}

nav a{
    text-decoration:none;
    color:var(--ink);
    font-size:0.93rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
    position:relative;
}

nav a::after{
    content:"";
    position:absolute;
    left:0;
    bottom:-5px;
    width:0;
    height:2px;
    background:var(--accent);
    transition:width 0.3s ease;
}

nav a:hover::after,
nav a.active::after{
    width:100%;
}

.contact-section{
    padding:54px 48px 62px;
    display:grid;
    grid-template-columns:0.95fr 1.05fr;
    gap:24px;
}

.contact-left,
.contact-right{
    border:1px solid var(--line);
    border-radius:22px;
    background:rgba(255,255,255,0.6);
}

.contact-left{
    padding:28px;
}

.contact-left h2{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(2.2rem,4vw,3rem);
    line-height:1.04;
    margin-bottom:14px;
}

.contact-left h2 span{
    color:var(--accent-deep);
}

.contact-left p{
    color:var(--muted);
    line-height:1.8;
    margin-bottom:24px;
}

.contact-info{
    display:flex;
    gap:14px;
    align-items:flex-start;
    padding:14px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.74);
    border-radius:14px;
    margin-bottom:12px;
}

.contact-info i{
    width:42px;
    height:42px;
    border-radius:12px;
    display:grid;
    place-items:center;
    background:linear-gradient(140deg,var(--accent),#a67635);
    color:#fff;
}

.contact-info h4{
    margin-bottom:4px;
}

.contact-info p{
    margin:0;
    font-size:0.94rem;
}

.contact-right{
    padding:28px;
}

.contact-right h2{
    text-align:center;
    font-family:'Cormorant Garamond',serif;
    font-size:2.4rem;
    margin-bottom:22px;
}

.contact-right h2 span{
    color:var(--accent-deep);
}

.form-row{
    display:flex;
    gap:12px;
}

.form-group{
    margin-bottom:14px;
    width:100%;
}

.sr-only{
    position:absolute;
    width:1px;
    height:1px;
    padding:0;
    margin:-1px;
    overflow:hidden;
    clip:rect(0,0,0,0);
    white-space:nowrap;
    border:0;
}

.form-group input,
.form-group textarea{
    width:100%;
    border:1px solid var(--line);
    border-radius:12px;
    background:rgba(255,255,255,0.86);
    font-family:inherit;
    font-size:0.96rem;
    color:var(--ink);
    padding:13px 14px;
    transition:border-color 0.25s ease,box-shadow 0.25s ease;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 4px rgba(184,136,70,0.18);
}

.form-group textarea{
    min-height:120px;
    resize:vertical;
}

.btn{
    width:100%;
    border:none;
    border-radius:999px;
    padding:14px;
    background:linear-gradient(130deg,var(--accent),#a67635);
    color:#fff;
    font-weight:700;
    letter-spacing:0.05em;
    cursor:pointer;
    transition:transform 0.2s ease,box-shadow 0.2s ease;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 20px rgba(167,116,52,0.3);
}

.btn:disabled{
    opacity:0.72;
    cursor:not-allowed;
}

.success-message{
    display:none;
    margin-top:14px;
    border-radius:12px;
    background:rgba(184,136,70,0.2);
    color:var(--accent-deep);
    text-align:center;
    border:1px solid rgba(184,136,70,0.35);
    padding:10px 12px;
    font-weight:600;
}

.error-message{
    display:none;
    margin-top:14px;
    border-radius:12px;
    background:rgba(163,58,58,0.12);
    color:#8f2a2a;
    text-align:center;
    border:1px solid rgba(163,58,58,0.35);
    padding:10px 12px;
    font-weight:600;
}

.consent-note{
    margin-top:12px;
    color:var(--muted);
    font-size:0.86rem;
    line-height:1.6;
}

.consent-note label{
    display:flex;
    align-items:flex-start;
    gap:8px;
}

.consent-note input{
    margin-top:2px;
}

@media(max-width:1060px){
    .contact-section{
        grid-template-columns:1fr;
    }
}

@media(max-width:720px){
    .page-shell{
        width:94%;
        margin:14px auto;
        border-radius:22px;
    }

    header{
        flex-direction:column;
        gap:16px;
        padding:18px;
    }

    nav{
        justify-content:center;
        gap:14px;
    }

    nav a{
        font-size:0.78rem;
    }

    .contact-section,
    .contact-left,
    .contact-right{
        padding:18px;
    }

    .contact-section{
        gap:18px;
    }

    .form-row{
        flex-direction:column;
    }
}
</style>

<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>
<div class="page-shell">
<header>
    <div class="logo">
        <img src="profile.jpeg" alt="Harsha DevSpace logo">
        <h2>Harsha DevSpace</h2>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="Services.html">Services</a>
        <a href="About.html">About</a>
        <a href="Projects.html">Projects</a>
        <a href="certificates.html">Certificates</a>
        <a href="Contact.html" class="active">Contact</a>
    </nav>
</header>

<section class="contact-section">
<div class="contact-left">
    <h2>Let us Work <span>Together.</span></h2>
    <p>
        Have a project in mind or just want to say hello?
        Feel free to reach out anytime.
    </p>

    <div class="contact-info">
        <i class="fas fa-phone"></i>
        <div>
            <h4>Phone</h4>
            <p>+91 9346412185</p>
        </div>
    </div>

    <div class="contact-info">
        <i class="fas fa-envelope"></i>
        <div>
            <h4>Email</h4>
            <p>hv0279135@gmail.com</p>
        </div>
    </div>

    <div class="contact-info">
        <i class="fas fa-map-marker-alt"></i>
        <div>
            <h4>Country</h4>
            <p>Telangana, India</p>
        </div>
    </div>
</div>

<div class="contact-right">
    <h2><span>Contact</span> Me</h2>

    <form id="contactForm" novalidate>
        <div class="form-row">
            <div class="form-group">
                <label for="name" class="sr-only">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" autocomplete="name" required>
            </div>
            <div class="form-group">
                <label for="email" class="sr-only">Your Email</label>
                <input type="email" id="email" name="email" placeholder="Your Email" autocomplete="email" required>
            </div>
        </div>

        <div class="form-group">
            <label for="phone" class="sr-only">Your Phone</label>
            <input type="text" id="phone" name="phone" placeholder="Your Phone" autocomplete="tel">
        </div>

        <div class="form-group">
            <label for="message" class="sr-only">Your Message</label>
            <textarea id="message" name="message" placeholder="Your Message" required></textarea>
        </div>

        <div class="form-group sr-only" aria-hidden="true">
            <label for="website">Website</label>
            <input type="text" id="website" name="website" tabindex="-1" autocomplete="off">
        </div>

        <input type="hidden" id="formLoadedAt" name="formLoadedAt" value="">

        <button type="submit" class="btn">Send Message</button>

        <div class="consent-note">
            <label for="consent">
                <input type="checkbox" id="consent" name="consent" required>
                <span>I consent to storing and processing my details for a reply to this inquiry.</span>
            </label>
        </div>

        <div class="success-message" id="successMsg" role="status" aria-live="polite">
            Message Sent Successfully!
        </div>

        <div class="error-message" id="errorMsg" role="alert" aria-live="assertive"></div>
    </form>
</div>
</section>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script src="contact.js"></script>

</body>
</html>
